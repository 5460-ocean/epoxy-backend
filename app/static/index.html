<!DOCTYPE html>
<html>
<head>
<title>Epoxy Generator</title>
<style>
body {
    background: black;
    color: white;
    font-family: Arial;
}

#controls {
    margin: 10px;
}

input, select, button {
    padding: 8px;
    margin: 5px;
    font-size: 14px;
    width: 90%;
    max-width: 400px;
    display: block;
}

canvas {
    width: 100%;
    height: 300px;
    display: block;
}
</style>
</head>

<body>

<h2>Epoxy Generator</h2>

<div id="controls">
    <input id="descInput" placeholder="Describe your epoxy..." />
    
    <select id="themeSelect">
        <option>Ocean</option>
        <option>Fire</option>
        <option>Galaxy</option>
        <option>Marble</option>
    </select>

    <button id="generateBtn">Generate</button>
    <button id="saveBtn">Save</button>
    <button id="loadBtn">Load</button>
    <button id="downloadBtn">Download</button>
</div>

<canvas id="canvas"></canvas>

<script src="/static/script_v2.js?v=200"></script>

</body>
</html>
