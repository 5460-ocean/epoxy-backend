<!DOCTYPE html>
<html>
<head>
    <title>Epoxy Generator</title>
    <style>
        body {
            margin: 0;
            background: #0b0f1a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 { margin: 10px; }

        canvas {
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin: 10px;
        }

        button {
            padding: 10px;
            margin: 5px;
            background: #1f2a44;
            color: white;
            border: none;
            border-radius: 6px;
        }

        input {
            padding: 8px;
            width: 200px;
        }
    </style>
</head>
<body>

<h1>Epoxy Generator</h1>

<input id="prompt" placeholder="Describe epoxy style..." />

<canvas id="canvas"></canvas>

<div class="controls">
    <button id="generate">Generate</button>
    <button id="download">Download</button>
</div>

<script src="/static/script_v3.js"></script>

</body>
</html>
