<!DOCTYPE html>
<html>
<head>
  <title>Epoxy Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- For CSS capture -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0a0a0a;
      color: white;
    }

    #canvas {
      width: 300px;
      height: 300px;
      margin: 20px auto;
      border-radius: 20px;
      background: linear-gradient(45deg, #00c6ff, #003366);
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #00c6ff;
      color: black;
    }
  </style>
</head>

<body>

<h2>Epoxy Generator</h2>

<input id="prompt" placeholder="e.g. ocean, fire, desert dunes" />

<br>

<button onclick="generate()">Generate Epoxy Design</button>
<button onclick="downloadDesign()">Download Design</button>

<div id="canvas"></div>

<script>
const API = "https://epoxy-backend-106r.onrender.com";

async function generate() {
  const text = document.getElementById("prompt").value;

  const res = await fetch(API + "/ai/generate-style", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text })
  });

  const data = await res.json();
  const colors = data.colors;

  const el = document.getElementById("canvas");

  el.style.background = `
    linear-gradient(45deg, ${colors[0]}, ${colors[1]})
  `;
}

function downloadDesign() {
  const el = document.getElementById("canvas");

  html2canvas(el).then(canvas => {
    const link = document.createElement("a");
    link.download = "epoxy-design.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
