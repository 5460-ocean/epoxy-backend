<!DOCTYPE html>
<html>
<head>
    <title>Epoxy Generator</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        #controls {
            padding: 10px;
        }

        canvas {
            width: 100vw;
            height: 80vh;
            display: block;
            margin: auto;
            background: black;
        }
    </style>
</head>
<body>

<div id="controls">
    <input id="prompt" placeholder="Enter style (e.g. Ocean Waves)" />
    <button onclick="generate()">Generate</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // 🔥 FIX: REAL SIZE (CRITICAL)
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.8;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    let t = 0;
    let colors = ["#0077ff", "#001f3f"];

    const API_URL = "https://epoxy-backend-106r.onrender.com";

    async function generateStyle(prompt) {
        try {
            const res = await fetch(API_URL + "/ai/generate-style", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ prompt })
            });

            const data = await res.json();
            console.log("AI:", data);

            if (data.colors && data.colors.length >= 2) {
                colors = data.colors;
            }

        } catch (e) {
            console.error(e);
            colors = ["#ff0000", "#000000"]; // error = red
        }
    }

    function draw() {
        const w = canvas.width;
        const h = canvas.height;

        ctx.clearRect(0, 0, w, h);

        let gradient = ctx.createLinearGradient(0, 0, 0, h);
        gradient.addColorStop(0, colors[0]);
        gradient.addColorStop(1, colors[1]);

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);

        // 🌊 visible wave
        ctx.beginPath();
        for (let x = 0; x < w; x++) {
            let y = h / 2 + Math.sin(x * 0.02 + t) * 30;
            ctx.lineTo(x, y);
        }
        ctx.strokeStyle = "white";
        ctx.stroke();

        t += 0.05;
        requestAnimationFrame(draw);
    }

    draw();

    function generate() {
        const input = document.getElementById("prompt").value;
        generateStyle(input);
    }
</script>

</body>
</html>
