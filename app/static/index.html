<!DOCTYPE html>
<html>
<head>
  <title>Epoxy AI Studio</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body { font-family: Arial; background: #0f172a; color: white; padding: 10px; }
    input, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: none; }
    button { background: #2563eb; color: white; font-weight: bold; }

    .card { background: #1e293b; padding: 15px; margin-top: 15px; border-radius: 12px; }

    .surface {
      width: 100%;
      height: 160px;
      margin-top: 12px;
      border-radius: 12px;
      transform: perspective(500px) rotateX(15deg);
      overflow: hidden;
      position: relative;
    }

    .layer { position: absolute; width: 100%; height: 100%; }

    .pour {
      position: absolute;
      width: 100%;
      height: 0%;
      animation: pourDown 1s forwards;
    }

    @keyframes pourDown {
      from { height: 0%; }
      to { height: 100%; }
    }
  </style>
</head>

<body>

<h2>🎨 Epoxy AI Studio</h2>

<input id="token" placeholder="Paste JWT token" />
<button onclick="loadProjects()">Load Projects</button>

<div id="projects"></div>

<script>
const API = "https://epoxy-backend-106r.onrender.com";

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// 🔥 THIS USES AI COLORS ONLY
async function simulatePourWithColors(surface, colors) {
  surface.innerHTML = "";

  for (let i = 0; i < 3; i++) {
    const layer = document.createElement("div");
    layer.className = "layer";
    layer.style.background = `linear-gradient(${colors[0]}, ${colors[1]})`;

    surface.appendChild(layer);

    const pour = document.createElement("div");
    pour.className = "pour";
    pour.style.background = layer.style.background;

    layer.appendChild(pour);

    await sleep(500);
  }
}

async function loadProjects() {
  const token = document.getElementById("token").value.trim();
  const container = document.getElementById("projects");
  container.innerHTML = "";

  const res = await axios.get(API + "/project/", {
    headers: { Authorization: "Bearer " + token }
  });

  res.data.items.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    const surface = document.createElement("div");
    surface.className = "surface";

    const input = document.createElement("input");
    input.placeholder = "Describe design (desert dunes, galaxy, etc)";

    const btn = document.createElement("button");
    btn.innerText = "✨ Generate (AI)";

    btn.onclick = async () => {
      const prompt = input.value;

      const res = await axios.post(API + "/ai/generate-style", {
        text: prompt
      });

      console.log("AI RESPONSE:", res.data); // 👈 DEBUG

      let colors = res.data.colors;

      // fallback safety
      if (!colors) {
        colors = ["#00c6ff", "#003366"];
      }

      await simulatePourWithColors(surface, colors);
    };

    div.innerHTML = `<h3>${p.name}</h3>`;
    div.appendChild(surface);
    div.appendChild(input);
    div.appendChild(btn);

    container.appendChild(div);
  });
}
</script>

</body>
</html>
