<!DOCTYPE html>
<html>
<head>
    <title>Epoxy Generator</title>
</head>
<body style="margin:0; background:black; color:white; font-family:sans-serif;">

    <h2>Epoxy Generator</h2>

    <!-- INPUT -->
    <input id="promptInput" placeholder="Describe epoxy (ocean, fire, galaxy...)" 
           style="width:60%; padding:10px; font-size:16px;" />

    <!-- THEME DROPDOWN -->
    <select id="themeSelect">
        <option>Ocean</option>
        <option>Fire</option>
        <option>Galaxy</option>
        <option>Marble</option>
    </select>

    <!-- BUTTONS -->
    <button id="generateBtn">Generate</button>
    <button id="saveBtn">Save</button>
    <button id="loadBtn">Load</button>
    <button id="downloadBtn">Download</button>

    <br><br>

    <!-- CANVAS -->
    <canvas id="canvas"></canvas>

    <!-- KEEP CACHE BUSTER -->
    <script src="/static/script_v2.js?v=10001"></script>

</body>
</html>
