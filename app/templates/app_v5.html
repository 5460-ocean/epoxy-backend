<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Epoxy Generator V5</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{

    background:
        radial-gradient(circle at top,#101827,#050505 60%);

    color:white;

    font-family:
        Inter,
        Arial,
        sans-serif;

    overflow-x:hidden;
}

.app{

    width:95%;
    max-width:1600px;

    margin:auto;

    padding-top:24px;
    padding-bottom:40px;
}

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:24px;
}

.title{

    font-size:42px;

    font-weight:800;

    letter-spacing:-1px;
}

.subtitle{

    color:#8ba3c7;

    margin-top:6px;

    font-size:15px;
}

.layout{

    display:grid;

    grid-template-columns:
        380px
        1fr;

    gap:24px;
}

.sidebar{

    background:
        rgba(10,12,20,0.85);

    border:
        1px solid rgba(255,255,255,0.08);

    border-radius:28px;

    padding:24px;

    backdrop-filter:blur(20px);

    box-shadow:
        0 0 40px rgba(0,0,0,0.35);
}

.section{

    margin-bottom:26px;
}

.section-title{

    font-size:13px;

    color:#7f96b8;

    margin-bottom:12px;

    letter-spacing:1px;

    text-transform:uppercase;
}

.input,
.select{

    width:100%;

    padding:16px;

    background:#0b0f17;

    border:
        1px solid rgba(255,255,255,0.08);

    border-radius:16px;

    color:white;

    font-size:15px;

    outline:none;
}

.slider-group{

    margin-bottom:18px;
}

.slider-label{

    display:flex;

    justify-content:space-between;

    margin-bottom:8px;

    color:#cfd9ea;

    font-size:14px;
}

.slider{

    width:100%;
}

.palette{

    display:grid;

    grid-template-columns:
        repeat(5,1fr);

    gap:10px;
}

.swatch{

    height:48px;

    border-radius:14px;

    border:
        2px solid rgba(255,255,255,0.08);
}

.buttons{

    display:grid;

    grid-template-columns:
        repeat(2,1fr);

    gap:12px;
}

button{

    padding:16px;

    border:none;

    border-radius:16px;

    background:
        linear-gradient(
            135deg,
            #18263d,
            #0f1625
        );

    color:white;

    font-size:15px;

    cursor:pointer;

    transition:0.25s;
}

button:hover{

    transform:translateY(-2px);

    background:
        linear-gradient(
            135deg,
            #20314f,
            #121c2e
        );
}

.main{

    position:relative;
}

.canvas-wrap{

    position:relative;

    border-radius:34px;

    overflow:hidden;

    border:
        1px solid rgba(255,255,255,0.08);

    background:black;

    min-height:82vh;

    box-shadow:
        0 0 80px rgba(0,0,0,0.4),
        0 0 120px rgba(0,60,140,0.08);
}

canvas{

    width:100%;
    height:82vh;

    display:block;
}

.overlay{

    position:absolute;

    top:20px;
    left:20px;

    display:flex;

    gap:12px;
}

.tag{

    padding:10px 16px;

    border-radius:30px;

    background:
        rgba(255,255,255,0.08);

    border:
        1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(10px);

    font-size:13px;

    color:#d7e5ff;
}

@media(max-width:1100px){

    .layout{

        grid-template-columns:1fr;
    }

    .canvas-wrap{

        min-height:60vh;
    }

    canvas{

        height:60vh;
    }
}

</style>
</head>

<body>

<div class="app">

    <div class="header">

        <div>

            <div class="title">
                Epoxy Generator
            </div>

            <div class="subtitle">
                Luxury Metallic Ocean Resin Renderer
            </div>

        </div>

    </div>

    <div class="layout">

        <div class="sidebar">

            <div class="section">

                <div class="section-title">
                    Prompt
                </div>

                <input
                    id="prompt"
                    class="input"
                    placeholder="Describe your epoxy design..."
                >

            </div>

            <div class="section">

                <div class="section-title">
                    Preset
                </div>

                <select
                    id="preset"
                    class="select"
                >

                    <option>Premium Ocean</option>
                    <option>Luxury Gold Resin</option>
                    <option>Deep Atlantic</option>
                    <option>White Marble Flow</option>
                    <option>Volcanic Metallic</option>
                    <option>Emerald Resin</option>

                </select>

            </div>

            <div class="section">

                <div class="section-title">
                    Parameters
                </div>

                <div class="slider-group">

                    <div class="slider-label">
                        <span>Flow Strength</span>
                        <span>0.82</span>
                    </div>

                    <input
                        type="range"
                        class="slider"
                        min="0"
                        max="1"
                        step="0.01"
                        value="0.82"
                    >

                </div>

                <div class="slider-group">

                    <div class="slider-label">
                        <span>Gold Intensity</span>
                        <span>0.64</span>
                    </div>

                    <input
                        type="range"
                        class="slider"
                        min="0"
                        max="1"
                        step="0.01"
                        value="0.64"
                    >

                </div>

                <div class="slider-group">

                    <div class="slider-label">
                        <span>Foam Cells</span>
                        <span>0.48</span>
                    </div>

                    <input
                        type="range"
                        class="slider"
                        min="0"
                        max="1"
                        step="0.01"
                        value="0.48"
                    >

                </div>

                <div class="slider-group">

                    <div class="slider-label">
                        <span>Depth Layering</span>
                        <span>0.91</span>
                    </div>

                    <input
                        type="range"
                        class="slider"
                        min="0"
                        max="1"
                        step="0.01"
                        value="0.91"
                    >

                </div>

            </div>

            <div class="section">

                <div class="section-title">
                    Color Palette
                </div>

                <div class="palette">

                    <div
                        class="swatch"
                        style="background:#021526;"
                    ></div>

                    <div
                        class="swatch"
                        style="background:#03346E;"
                    ></div>

                    <div
                        class="swatch"
                        style="background:#6EACDA;"
                    ></div>

                    <div
                        class="swatch"
                        style="background:#E2E2B6;"
                    ></div>

                    <div
                        class="swatch"
                        style="background:#D4AF37;"
                    ></div>

                </div>

            </div>

            <div class="section">

                <div class="section-title">
                    Actions
                </div>

                <div class="buttons">

                    <button id="randomizeBtn">
                        Randomize
                    </button>

                    <button id="generateBtn">
                        Generate
                    </button>

                    <button id="saveBtn">
                        Save
                    </button>

                    <button id="loadBtn">
                        Load
                    </button>

                    <button id="downloadBtn">
                        Download
                    </button>

                </div>

            </div>

        </div>

        <div class="main">

            <div class="canvas-wrap">

                <div class="overlay">

                    <div class="tag">
                        FLOW FIELD RENDERING
                    </div>

                    <div class="tag">
                        MULTI-LAYER RESIN
                    </div>

                </div>

                <canvas id="glcanvas"></canvas>

            </div>

        </div>

    </div>

</div>

<script src="/static/script_v5.js"></script>

</body>
</html>
