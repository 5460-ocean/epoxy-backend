<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Ocean Epoxy Generator</title>

<style>

html, body{
    margin:0;
    padding:0;
    background:#050505;
    color:white;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

.wrapper{
    width:92%;
    max-width:1200px;
    margin:auto;
    padding-top:20px;
    padding-bottom:40px;
}

h1{
    font-size:48px;
    margin-bottom:20px;
    font-weight:700;
}

.controls{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:24px;
}

input, select, button{

    width:100%;
    box-sizing:border-box;

    padding:18px;

    background:#0c0c0c;

    border:1px solid #333;

    color:white;

    font-size:20px;

    border-radius:10px;
}

button{
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#1a1a1a;
}

.canvas-wrap{

    position:relative;

    width:100%;

    border-radius:22px;

    overflow:hidden;

    border:1px solid #222;

    background:black;

    box-shadow:
        0 0 40px rgba(0,0,0,0.65),
        0 0 120px rgba(0,40,80,0.2);
}

canvas{
    width:100%;
    height:72vh;
    display:block;
}

.badge{

    position:absolute;

    top:20px;
    right:20px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    padding:10px 16px;

    border-radius:30px;

    font-size:14px;

    letter-spacing:1px;

    border:1px solid rgba(255,255,255,0.15);
}

</style>
</head>

<body>

<div class="wrapper">

    <h1>Epoxy Generator</h1>

    <div class="controls">

        <input
            id="prompt"
            placeholder="Describe your epoxy design..."
        >

        <select id="preset">

            <option>Ocean</option>
            <option>Luxury Gold</option>
            <option>Deep Resin</option>
            <option>White Marble</option>
            <option>Metallic Flow</option>

        </select>

        <button id="generateBtn">
            Generate
        </button>

        <button>
            Save
        </button>

        <button>
            Load
        </button>

        <button id="downloadBtn">
            Download
        </button>

    </div>

    <div class="canvas-wrap">

        <div class="badge">
            PREMIUM OCEAN EPOXY
        </div>

        <canvas id="glcanvas"></canvas>

    </div>

</div>

<script src="/static/script_v5.js"></script>

</body>
</html>
