<!DOCTYPE html>
<html>
<head>
  <title>Epoxy App</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 10px;
      background: #f5f5f5;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .surface {
      width: 100%;
      height: 120px;
      margin-top: 10px;
      border-radius: 8px;
      transform: perspective(400px) rotateX(20deg) rotateY(10deg);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .table {
      background: linear-gradient(135deg, #8B4513, #3e1f0d);
    }

    .floor {
      background: linear-gradient(135deg, #00aaff, #004488);
    }

    .wall {
      background: linear-gradient(135deg, #cccccc, #777777);
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Epoxy Projects</h2>

<input id="token" placeholder="Paste JWT token" />
<button onclick="loadProjects()">Load Projects</button>

<div id="status"></div>
<div id="projects"></div>

<script>
const API = "";

async function loadProjects() {
  const token = document.getElementById("token").value.trim();
  const status = document.getElementById("status");
  const container = document.getElementById("projects");

  container.innerHTML = "";
  status.innerText = "Loading...";

  try {
    const res = await axios.get(API + "/project/", {
      headers: { Authorization: "Bearer " + token }
    });

    if (res.data.items.length === 0) {
      status.innerText = "No projects found ❌";
      return;
    }

    status.innerText = "Loaded successfully ✅";

    res.data.items.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";

      let surfaceClass = "table";
      if (p.surface.toLowerCase().includes("floor")) surfaceClass = "floor";
      if (p.surface.toLowerCase().includes("wall")) surfaceClass = "wall";

      div.innerHTML = `
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <small>Surface: ${p.surface}</small>
        <div class="surface ${surfaceClass}"></div>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    status.innerText = "Error: " + err;
  }
}
</script>

</body>
</html>
