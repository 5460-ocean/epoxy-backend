<!DOCTYPE html>
<html>
<head>
  <title>Epoxy App</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

<h2>Epoxy Projects</h2>

<input id="token" placeholder="Paste JWT token" style="width:100%" />
<button onclick="loadProjects()">Load Projects</button>

<p id="status"></p>
<pre id="debug"></pre>

<div id="projects"></div>

<script>
const API = "";

async function loadProjects() {
  const rawToken = document.getElementById("token").value;
  const token = rawToken.trim();

  const status = document.getElementById("status");
  const debug = document.getElementById("debug");

  try {
    status.innerText = "Loading...";

    console.log("TOKEN:", token);

    const res = await axios.get("/project/", {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    debug.innerText = JSON.stringify(res.data, null, 2);

    if (!res.data.items || res.data.items.length === 0) {
      status.innerText = "No projects found ❌";
      return;
    }

    status.innerText = "Loaded successfully ✅";

    const container = document.getElementById("projects");
    container.innerHTML = "";

    res.data.items.forEach(p => {
      const div = document.createElement("div");
      div.innerHTML = `<h3>${p.name}</h3><p>${p.description}</p>`;
      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    status.innerText = "Error: " + err;
  }
}
</script>

</body>
</html>
