<!DOCTYPE html>
<html>
<head>
  <title>Epoxy App</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 10px;
      background: #f0f2f5;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .surface {
      width: 100%;
      height: 160px;
      margin-top: 12px;
      border-radius: 12px;
      transform: perspective(500px) rotateX(18deg) rotateY(8deg);
      position: relative;
      overflow: hidden;
      box-shadow: 0 15px 25px rgba(0,0,0,0.4);
    }

    .layer {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      opacity: 0.9;
    }

    .pour {
      position: absolute;
      width: 100%;
      height: 0%;
      top: 0;
      left: 0;
      border-radius: 12px;
      animation: pourDown 1s ease forwards;
    }

    @keyframes pourDown {
      from { height: 0%; }
      to { height: 100%; }
    }

    /* 🌊 swirl */
    .layer::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 40%),
                  radial-gradient(circle at 70% 70%, rgba(255,255,255,0.2), transparent 40%);
      animation: swirl 6s infinite linear;
    }

    @keyframes swirl {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ✨ curing shine */
    .cured::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      animation: shine 2s forwards;
    }

    @keyframes shine {
      from { left: -100%; }
      to { left: 100%; }
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Epoxy Projects</h2>

<input id="token" placeholder="Paste JWT token" />
<button onclick="loadProjects()">Load Projects</button>

<div id="status"></div>
<div id="projects"></div>

<script>
const API = "https://epoxy-backend-106r.onrender.com";

function getStyleColors(style) {
  if (!style) return ["#00c6ff", "#003366"];

  style = style.toLowerCase();

  if (style.includes("ocean")) return ["#00c6ff", "#003366"];
  if (style.includes("galaxy")) return ["#8e2de2", "#000000"];
  if (style.includes("fire")) return ["#ff512f", "#dd2476"];
  if (style.includes("forest")) return ["#134e5e", "#71b280"];
  if (style.includes("marble")) return ["#eeeeee", "#777777"];

  return ["#00c6ff", "#003366"];
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function simulatePour(surfaceContainer, style) {
  surfaceContainer.innerHTML = "";

  const layers = [];

  for (let i = 0; i < 3; i++) {
    const [c1, c2] = getStyleColors(style);

    const layer = document.createElement("div");
    layer.className = "layer";
    layer.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    layer.style.transform = `translateY(${i * 6}px)`;
    layer.style.opacity = 0.9 - i * 0.2;

    surfaceContainer.appendChild(layer);
    layers.push(layer);
  }

  // 🫗 pour layers one by one
  for (let i = 0; i < layers.length; i++) {
    const pour = document.createElement("div");
    pour.className = "pour";
    pour.style.background = layers[i].style.background;

    layers[i].appendChild(pour);

    await sleep(800); // delay between pours
  }

  // 🧊 curing effect
  await sleep(500);
  surfaceContainer.classList.add("cured");
}

async function loadProjects() {
  const token = document.getElementById("token").value.trim();
  const status = document.getElementById("status");
  const container = document.getElementById("projects");

  container.innerHTML = "";
  status.innerText = "Loading...";

  try {
    const res = await axios.get(API + "/project/", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (!res.data.items || res.data.items.length === 0) {
      status.innerText = "No projects found ❌";
      return;
    }

    status.innerText = "Loaded successfully ✅";

    res.data.items.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";

      const surface = document.createElement("div");
      surface.className = "surface";

      simulatePour(surface, p.theme);

      const btn = document.createElement("button");
      btn.innerText = "🫗 Replay Pour";
      btn.onclick = () => simulatePour(surface, p.theme);

      div.innerHTML = `
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <small>Theme: ${p.theme}</small>
      `;

      div.appendChild(surface);
      div.appendChild(btn);

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    status.innerText = "Error: " + err;
  }
}
</script>

</body>
</html>
