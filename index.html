<!DOCTYPE html>
<html>
<head>
  <title>Epoxy App</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 10px;
      background: #f0f2f5;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .surface {
      width: 100%;
      height: 140px;
      margin-top: 12px;
      border-radius: 12px;
      transform: perspective(500px) rotateX(18deg) rotateY(8deg);
      position: relative;
      overflow: hidden;
      box-shadow: 0 15px 25px rgba(0,0,0,0.4);
    }

    /* 🌊 Epoxy swirl effect */
    .surface::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 40%),
                  radial-gradient(circle at 70% 70%, rgba(255,255,255,0.2), transparent 40%);
      animation: swirl 6s infinite linear;
    }

    /* ✨ Gloss shine */
    .surface::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
      );
      animation: shine 3s infinite;
    }

    @keyframes swirl {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes shine {
      from { left: -100%; }
      to { left: 100%; }
    }

    .table {
      background: linear-gradient(135deg, #5a2d0c, #2e1505);
    }

    .floor {
      background: linear-gradient(135deg, #00c6ff, #003366);
    }

    .wall {
      background: linear-gradient(135deg, #dddddd, #888888);
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Epoxy Projects</h2>

<input id="token" placeholder="Paste JWT token" />
<button onclick="loadProjects()">Load Projects</button>

<div id="status"></div>
<div id="projects"></div>

<script>
const API = "https://epoxy-backend-106r.onrender.com";

async function loadProjects() {
  const token = document.getElementById("token").value.trim();
  const status = document.getElementById("status");
  const container = document.getElementById("projects");

  container.innerHTML = "";
  status.innerText = "Loading...";

  try {
    const res = await axios.get(API + "/project/", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (!res.data.items || res.data.items.length === 0) {
      status.innerText = "No projects found ❌";
      return;
    }

    status.innerText = "Loaded successfully ✅";

    res.data.items.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";

      let surfaceClass = "table";
      if (p.surface.toLowerCase().includes("floor")) surfaceClass = "floor";
      if (p.surface.toLowerCase().includes("wall")) surfaceClass = "wall";

      div.innerHTML = `
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <small>Surface: ${p.surface}</small>
        <div class="surface ${surfaceClass}"></div>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    status.innerText = "Error: " + err;
  }
}
</script>

</body>
</html>
